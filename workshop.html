<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Workshop — GMBP</title>
<link rel="stylesheet" href="style.css">
<style>
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-top:16px}
.eq-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.eq-card:hover{border-color:rgba(0,212,255,.4);box-shadow:0 0 20px rgba(0,212,255,.07)}
.eq-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--glow2),var(--glow))}
.eq-card.locked{opacity:.45;filter:grayscale(.6)}
.eq-card.locked::before{background:var(--border)}
.eq-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.eq-icon{font-size:34px;line-height:1}
.eq-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--white)}
.eq-owned{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--amber)}
.eq-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.eq-stats{display:flex;gap:10px;margin-bottom:14px}
.eq-stat{flex:1;background:rgba(0,0,0,.3);border-radius:4px;padding:7px;text-align:center}
.eq-stat .v{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green)}
.eq-stat .l{font-size:10px;color:var(--muted);letter-spacing:.1em}
.eq-buy{display:flex;gap:8px;align-items:center}
.eq-cost{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--amber);flex:1}
.unlock-info{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px}
.summary-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 20px;display:flex;gap:28px;flex-wrap:wrap;margin-bottom:4px}
.summary-bar .si{display:flex;flex-direction:column;gap:2px}
.summary-bar .si span{font-family:'Share Tech Mono',monospace;font-size:17px;color:var(--green)}
.summary-bar .si small{font-size:10px;color:var(--muted);letter-spacing:.1em}

/* SECURITY SHOP */
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:12px}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;transition:border-color .2s}
.sec-card.active{border-color:rgba(0,212,255,.5);background:rgba(0,212,255,.04)}
.sec-card h4{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px}
.sec-card p{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.4}
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="index.html">GM<span>›</span>BBP</a>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="market.html">Market</a>
    <a href="workshop.html" class="active">Workshop</a>
    <a href="report.html">Report</a>
  </div>
  <div class="nav-status">
    <div class="nav-stat"><small>CASH</small><strong id="nav-cash">$0</strong></div>
    <div class="nav-stat"><small>DATE</small><strong id="nav-date">—</strong></div>
  </div>
</nav>

<div class="main-wrap"><div class="section">
  <div class="mt-24">
    <div class="page-title">Equipment <span>Workshop</span></div>
    <div class="page-sub">// BUY EQUIPMENT · UPGRADE SECURITY</div>
  </div>

  <div class="summary-bar mt-16">
    <div class="si"><span id="sum-cash">$0</span><small>CASH</small></div>
    <div class="si"><span id="sum-rate">0 t/s</span><small>MINE RATE</small></div>
    <div class="si"><span id="sum-tax" style="color:var(--red)">$0/mo</span><small>MONTHLY TAX</small></div>
    <div class="si"><span id="sum-prog">0%</span><small>PROGRESS</small></div>
  </div>

  <div class="eq-grid" id="eq-grid"></div>

  <div class="mt-32">
    <div class="page-title" style="font-size:20px">🛡️ Security <span>System</span></div>
    <div class="page-sub">// Reduces sabotage risk from rival operatives</div>
    <div class="sec-grid" id="sec-grid"></div>
  </div>
</div></div>

<script src="game.js"></script>
<script>
const SECURITY_LEVELS=[
  {level:0,name:'No Security',   cost:0,     desc:'No protection. Sabotage risk grows unchecked.',             reduction:0,  emoji:'🔓'},
  {level:1,name:'Basic Guard',   cost:5000,  desc:'Armed guards. Reduces sabotage risk growth by 3/day.',      reduction:3,  emoji:'💂'},
  {level:2,name:'Advanced CCTV', cost:40000, desc:'AI surveillance. Reduces sabotage risk growth by 6/day.',   reduction:6,  emoji:'📷'},
  {level:3,name:'Quantum Fence', cost:300000,desc:'Impenetrable quantum barrier. Reduces risk by 10/day.',     reduction:10, emoji:'⚡'},
];

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(n){
  if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';
  if(n>=1e9) return'$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return'$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return'$'+(n/1e3).toFixed(1)+'K';
  return'$'+Math.floor(n).toLocaleString();
}
function fmtR(r){
  if(r>=1e6)return(r/1e6).toFixed(2)+'M t/s';
  if(r>=1e3)return(r/1e3).toFixed(1)+'K t/s';
  return r.toFixed(r<1?2:0)+' t/s';
}

// Buy equipment — read fresh, modify, save
window.buyEquip=function(id,qty){
  const S=GMBP.loadGame()||GMBP.defaultState();
  if(!S.upgrades)S.upgrades={};
  qty=qty||1;
  let bought=0;
  for(let i=0;i<qty;i++){
    const owned=S.equipment[id]||0;
    const cost=GMBP.equipCost(id,owned);
    if(S.cash<cost)break;
    S.cash-=cost;
    S.equipment[id]=owned+1;
    bought++;
  }
  if(bought>0){
    GMBP.addLog(S,`🏗️ Purchased ${bought}× ${GMBP.EQUIPMENT[id].name}. Total: ${S.equipment[id]}`,'info');
    GMBP.saveGame(S);
    renderAll(S);
  }
};

window.buySecurity=function(level){
  const S=GMBP.loadGame()||GMBP.defaultState();
  const sec=SECURITY_LEVELS[level];
  if(!sec||level===0)return;
  if((S.securityLevel||0)>=level){alert('Already have this or better.');return;}
  if(S.cash<sec.cost){alert('Not enough cash.');return;}
  S.cash-=sec.cost;
  S.securityLevel=level;
  GMBP.addLog(S,`🛡️ Security upgraded to: ${sec.name}`,'info');
  GMBP.saveGame(S);
  renderAll(S);
};

function renderEquipment(S){
  const prog=GMBP.progress(S);
  const grid=document.getElementById('eq-grid');
  grid.innerHTML='';

  for(const[id,eq]of Object.entries(GMBP.EQUIPMENT)){
    const owned=S.equipment[id]||0;
    const cost=GMBP.equipCost(id,owned);
    const canBuy=S.cash>=cost;
    const unlocked=prog>=eq.unlockPct;
    const totalRate=eq.mineRate*owned;

    const card=document.createElement('div');
    card.className='eq-card'+(unlocked?'':' locked');
    card.innerHTML=`
      <div class="eq-header">
        <div class="eq-icon">${eq.emoji}</div>
        <div><div class="eq-name">${eq.name}</div><div class="eq-owned">Owned: ${owned}</div></div>
      </div>
      <div class="eq-desc">${eq.desc}</div>
      <div class="eq-stats">
        <div class="eq-stat"><div class="v">${fmtR(eq.mineRate)}</div><div class="l">per unit</div></div>
        <div class="eq-stat"><div class="v">${owned>0?fmtR(totalRate):'—'}</div><div class="l">total</div></div>
        <div class="eq-stat"><div class="v" style="color:var(--red)">${fmt(eq.baseCost*owned*.015)}/mo</div><div class="l">tax</div></div>
      </div>
      ${unlocked?`
        <div class="eq-buy">
          <div class="eq-cost">${fmt(cost)}</div>
          <button class="btn btn-primary" onclick="buyEquip('${id}',1)" ${canBuy?'':'disabled'} style="font-size:12px;padding:8px 14px">×1</button>
          ${owned>=5?`<button class="btn btn-ghost" onclick="buyEquip('${id}',10)" style="font-size:11px;padding:8px 10px">×10</button>`:''}
        </div>
      `:`<div class="unlock-info">🔒 Unlocks at ${eq.unlockPct}% mountain progress</div>`}`;
    grid.appendChild(card);
  }
}

function renderSecurity(S){
  const grid=document.getElementById('sec-grid');
  grid.innerHTML='';
  const cur=S.securityLevel||0;
  SECURITY_LEVELS.forEach(sec=>{
    const isActive=cur>=sec.level;
    const canBuy=sec.level>0&&!isActive&&S.cash>=sec.cost;
    const card=document.createElement('div');
    card.className='sec-card'+(isActive?' active':'');
    card.innerHTML=`
      <div style="font-size:32px;margin-bottom:8px">${sec.emoji}</div>
      <h4>${sec.name}</h4>
      <p>${sec.desc}</p>
      ${sec.level===0?'<div style="font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--muted)">Default</div>':
        isActive?'<div style="font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--green)">✓ ACTIVE</div>':
        `<button class="btn btn-primary" onclick="buySecurity(${sec.level})" ${canBuy?'':'disabled'} style="font-size:11px;padding:8px 16px">${fmt(sec.cost)}</button>`}`;
    grid.appendChild(card);
  });
}

function renderSummary(S){
  const rate=GMBP.mineRatePerSec(S);
  const tax=GMBP.monthlyTax(S);
  const prog=GMBP.progress(S);
  document.getElementById('nav-cash').textContent=fmt(S.cash);
  document.getElementById('nav-date').textContent=`${MONTHS[S.month-1]} ${S.day}, ${S.year}`;
  document.getElementById('sum-cash').textContent=fmt(S.cash);
  document.getElementById('sum-rate').textContent=fmtR(rate);
  document.getElementById('sum-tax').textContent=fmt(tax)+'/mo';
  document.getElementById('sum-prog').textContent=prog.toFixed(4)+'%';
}

function renderAll(S){
  if(!S.upgrades)S.upgrades={};
  renderSummary(S);
  renderEquipment(S);
  renderSecurity(S);
}

setInterval(()=>{
  const S=GMBP.loadGame();
  if(S)renderAll(S);
},1500);

const initS=GMBP.loadGame()||GMBP.defaultState();
renderAll(initS);
</script>
</body>
</html>
